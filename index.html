<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
        }

        .card {
            width: 320px;
            padding: 25px;
            border-radius: 18px;
            background: linear-gradient(135deg, #111827, #1e293b);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: auto;
            border-radius: 50%;
            background: goldenrod;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .title {
            color: #60a5fa;
            font-size: 15px;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            background: rgb(252, 219, 157);
            color: black;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo">V</div>

        <h1>Vivek K. SRAV</h1>

        <div class="title">
            Founder of <strong style="color: gold;">Vishept</strong> • BCA Student • Tech Enthusiast •  Developer
        </div>

        <p>
            Passionate about technology, coding, design and building a powerful personal brand with creativity and
            innovation.
        </p>

        <a href="https://www.linkedin.com/in/vivekkumarsrav/" class="btn">Profele</a>

    </div>

</body>

</html>
